name: Build Wheel for Colab

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    container:
      image: pytorch/manylinux2_28-builder:cuda12.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build deps
        run: |
          pip install -r requirements.txt
          pip install ninja cmake "setuptools>=70.1.0" wheel numpy packaging requests six

      - name: Add swap (prevent OOM)
        run: |
          if ! swapon --show | grep -q /swapfile; then
            fallocate -l 8G /swapfile
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
          fi
          free -h
        continue-on-error: true

      - name: Build wheel
        env:
          USE_CUDA: "1"
          USE_CUDNN: "0"
          USE_MKLDNN: "0"
          USE_DISTRIBUTED: "0"
          USE_NCCL: "0"
          BUILD_TEST: "0"
          MAX_JOBS: "2"
          CMAKE_PREFIX_PATH: /usr
        run: |
          pip wheel --no-deps --no-build-isolation -w dist .
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: torch-colab-wheel
          path: dist/*.whl
          retention-days: 7
